name: jre
version: 17-edge
base: bare
build-base: ubuntu@24.04
platforms:
  amd64:
  arm64:

environment:
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-${CRAFT_ARCH_BUILD_FOR}

run-user: _daemon_

summary: OpenJDK 17 headless runtime environment
description: |
  This rock provides OpenJDK 17 runtime environment including the
  following public modules:
  - java.base - the foundational APIs of the Java SE Platform.
  - java.compiler - the Java programming language compiler
    API.
  - java.datatransfer - the Transferable and DataFlavor
    classes and interfaces.
  - java.desktop - the Java AWT, Swing, and other GUI APIs.
  - java.instrument - services that allow agents to instrument
    programs running on the JVM.
  - java.logging - the Java Logging API.
  - java.management - the Java Management Extensions (JMX) API.
  - java.management.rmi - the RMI connector for the Java Management
    Extensions (JMX) Remote API.
  - java.naming - the Java Naming and Directory Interface (JNDI) API.
  - java.net.http - the HTTP Client API.
  - java.prefs - the Preferences API.
  - java.rmi - the Remote Method Invocation (RMI) API.
  - java.scripting - the Scripting API.
  - java.se -  the API of the Java SE Platform.
  - java.security.jgss - the Java binding of the IETF Generic
    Security Services API (GSS-API).
  - java.security.sasl - Java support for the IETF Simple
    Authentication and Security Layer (SASL).
  - java.smartcardio - the Java Smart Card I/O API.
  - java.sql - the JDBC API.
  - java.sql.rowset - the JDBC RowSet API.
  - java.transaction.xa - an API for supporting distributed
    transactions in JDBC.
  - java.xml - the Java APIs for XML Processing (JAXP).
  - java.xml.crypto - the API for XML cryptography.
  - jdk.accessibility - the accessibility API.
  - jdk.charsets - the  charsets that are not in java.base
    (mostly double byte and IBM charsets).
  - jdk.crypto.cryptoki -the implementation of the SunPKCS11
    security provider.
  - jdk.crypto.ec - the implementation of the SunEC security
    provider.
  - jdk.dynalink - the API for dynamic linking of high-level
    operations on objects.
  - jdk.httpserver -  the JDK-specific HTTP server API, and provides
    the jwebserver tool for running a minimal HTTP server.
  - jdk.incubator.foreign - the API for interoperation with
    code and data outside of the JVM.
  - jdk.incubator.vector - the API for vector computations
    that compile at runtime to optimal vector instructions on
    supported CPU architectures.
  - jdk.internal.vm.ci - the JVM Compiler Interface (JVMCI)
    API.
  - jdk.internal.vm.compiler - the Graal JIT compiler
    implementation.
  - jdk.internal.vm.compiler.management - the management
    interface for the Graal JIT compiler.
  - jdk.jdwp.agent - the implementation of the Java Debug Wire
    Protocol (JDWP) agent.
  - jdk.jfr - the API for JDK Flight Recorder.
  - jdk.jsobject - the API for the JavaScript Object.
  - jdk.localedata - the locale data for locales other than US
    locale.
  - jdk.management - JDK-specific management interfaces for the JVM.
  - jdk.management.agent - the JMX management agent.
  - jdk.management.jfr - the Management Interface for JDK Flight
    Recorder.
  - jdk.naming.dns - the implementation of the DNS Java Naming
    provider.
  - jdk.naming.rmi - the implementation of the RMI Java Naming
    provider.
  - jdk.net - the JDK-specific Networking API.
  - jdk.nio.mapmode - the file mapping modes for java.nio.
  - jdk.sctp - the JDK-specific API for SCTP.
  - jdk.security.auth - the implementations of the
    javax.security.auth.* interfaces and various authentication
    modules.
  - jdk.security.jgss - the  JDK extensions to the GSS-API and an
    implementation of the SASL GSSAPI mechanism.
  - jdk.unsupported - access to sun.misc.Unsafe
  - jdk.xml.dom  - the subset of the W3C Document Object Model (DOM)
    API that is not part of the Java SE API.
  - jdk.zipfs - the implementation of the Zip file system provider.

parts:
  dependencies:
    plugin: nil
    stage-packages:
      - base-files_base
      - base-files_chisel
      - libc6_libs
      - libgcc-s1_libs
      - libstdc++6_libs
      - zlib1g_libs
      - libpcsclite1_libs
      - libnss3_libs

  runtime:
    plugin: nil
    build-packages:
      - openjdk-17-jdk-headless
    override-build: |
      JAVA_HOME=usr/lib/jvm/java-17-openjdk-${CRAFT_ARCH_BUILD_FOR}
      rm -rf ${CRAFT_PART_INSTALL}/${JAVA_HOME}
      /${JAVA_HOME}/bin/jlink --add-modules java.base,\
      java.compiler,\
      java.datatransfer,\
      java.desktop,\
      java.instrument,\
      java.logging,\
      java.management,\
      java.management.rmi,\
      java.naming,\
      java.net.http,\
      java.prefs,\
      java.rmi,\
      java.scripting,\
      java.se,\
      java.security.jgss,\
      java.security.sasl,\
      java.smartcardio,\
      java.sql,\
      java.sql.rowset,\
      java.transaction.xa,\
      java.xml,\
      java.xml.crypto,\
      jdk.accessibility,\
      jdk.charsets,\
      jdk.crypto.cryptoki,\
      jdk.crypto.ec,\
      jdk.dynalink,\
      jdk.httpserver,\
      jdk.incubator.foreign,\
      jdk.incubator.vector,\
      jdk.internal.vm.ci,\
      jdk.internal.vm.compiler,\
      jdk.internal.vm.compiler.management,\
      jdk.jdwp.agent,\
      jdk.jfr,\
      jdk.jsobject,\
      jdk.localedata,\
      jdk.management,\
      jdk.management.agent,\
      jdk.management.jfr,\
      jdk.naming.dns,\
      jdk.naming.rmi,\
      jdk.net,\
      jdk.nio.mapmode,\
      jdk.sctp,\
      jdk.security.auth,\
      jdk.security.jgss,\
      jdk.unsupported,\
      jdk.xml.dom,\
      jdk.zipfs \
      --no-header-files --no-man-pages -G \
      --output ${CRAFT_PART_INSTALL}/${JAVA_HOME}

      cd ${CRAFT_PART_INSTALL}
      mkdir -p usr/bin
      for tool in `ls ${CRAFT_PART_INSTALL}/${JAVA_HOME}/bin`; do
        ln -s --relative ${JAVA_HOME}/bin/${tool} usr/bin/
      done

  deb-security-manifest:
    plugin: make
    after:
      - runtime
      - dependencies
    source: https://github.com/canonical/rocks-security-manifest
    source-type: git
    source-branch: main
    override-prime: |
      gen_manifest
      FIELDS=(
          '${db:Status-Abbrev}'
          '${binary:Package}'
          '${Version}'
          '${source:Package}'
          '${Source:Version}\n'
        )
      (
        IFS="," dpkg-query -f "${FIELDS[*]}" \
          -W openjdk-17-jdk-headless | head -n 1
      ) >> ${CRAFT_PRIME}/usr/share/rocks/dpkg.query
      craftctl default
