summary: Build acmeair application and run self-tests

environment:
  M2_CACHE: /tmp/.m2
  PROJECT: acmeair-monolithic-java
  TAG: chiselled-demo-21
  ACMEAIR_REPO: https://github.com/vpa1977/${PROJECT}

prepare: |
  java --version
  git clone --branch ${TAG} ${ACMEAIR_REPO} && \
    (cd ${PROJECT} && git checkout ${TAG} && \
      mvn -Dmaven.repo.local="${M2_CACHE}" compile process-test-resources test-compile)

execute: |
  if [ "$ARCH" = "arm64" ]; then
    echo "MongoDB does not work on arm64, skipping tests"
  fi
  DOCKER_OPTS="--rm \
    -u $(id -u ${USER}):$(id -g ${USER}) \
    -v ${M2_CACHE}:${M2_CACHE} \
    -v $(pwd):$(pwd) \
    -w $(pwd)/${PROJECT}"
  docker run \
    ${DOCKER_OPTS} \
    ${MAVEN_IMAGE} \
      -X -e -Dmaven.repo.local="${M2_CACHE}" \
      -Duser.home=$(pwd) \
      surefire:test

restore: |
  rm -rf acmeair-monolithic-java
