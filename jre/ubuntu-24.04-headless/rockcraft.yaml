name: jre
version: 25-edge
base: bare
build-base: ubuntu@24.04
platforms:
  amd64:
  arm64:

summary: OpenJDK 25 headless runtime environment
description: |
  This rock provides OpenJDK 25 runtime environment including
  the following modules:
  - java.base
  - java.compiler
  - java.instrument
  - java.logging
  - java.management
  - java.management.rmi
  - java.naming
  - java.net.http
  - java.prefs
  - java.rmi
  - java.scripting
  - java.se
  - java.security.jgss
  - java.security.sasl
  - java.smartcardio
  - java.sql
  - java.sql.rowset
  - java.transaction.xa
  - java.xml
  - java.xml.crypto
  - jdk.attach
  - jdk.charsets
  - jdk.compiler
  - jdk.crypto.cryptoki
  - jdk.crypto.ec
  - jdk.dynalink
  - jdk.editpad
  - jdk.graal.compiler
  - jdk.graal.compiler.management
  - jdk.hotspot.agent
  - jdk.httpserver
  - jdk.incubator.vector
  - jdk.internal.ed
  - jdk.internal.jvmstat
  - jdk.internal.le
  - jdk.internal.md
  - jdk.internal.opt
  - jdk.internal.vm.ci
  - jdk.jartool
  - jdk.javadoc
  - jdk.jcmd
  - jdk.jconsole
  - jdk.jdeps
  - jdk.jdi
  - jdk.jdwp.agent
  - jdk.jfr
  - jdk.jlink
  - jdk.jpackage
  - jdk.jshell
  - jdk.jsobject
  - jdk.jstatd
  - jdk.localedata
  - jdk.management
  - jdk.management.agent
  - jdk.management.jfr
  - jdk.naming.dns
  - jdk.naming.rmi
  - jdk.net
  - jdk.nio.mapmode
  - jdk.sctp
  - jdk.security.auth
  - jdk.security.jgss
  - jdk.unsupported
  - jdk.zipfs

parts:
  dependencies:
    plugin: nil
    stage-packages:
      - base-files_base
      - base-files_chisel
      - base-passwd_data
      - libc6_libs
      - libgcc-s1_libs
      - libstdc++6_libs
      - zlib1g_libs
      - libpcsclite1_libs
      - libnss3_libs
    override-build: |
      craftctl default
      groupadd --root ${CRAFT_PART_INSTALL} app -g 10001
      useradd -d /home/app -s /bin/bash --root ${CRAFT_PART_INSTALL}\
        -g app -m -u 10001 app

  runtime:
    plugin: nil
#    build-packages:
#      - openjdk-25-jdk-headless
    override-build: |
      # Cannot find package listed in 'build-packages': openjdk-25-jdk-headless
      # https://github.com/canonical/rockcraft/issues/1005
      apt-get update && apt-get install -y openjdk-25-jdk-headless
      JAVA_HOME=usr/lib/jvm/java-25-openjdk-${CRAFT_ARCH_BUILD_FOR}
      rm -rf ${CRAFT_PART_INSTALL}/${JAVA_HOME}
      /usr/lib/jvm/java-25-openjdk-${CRAFT_ARCH_BUILD_FOR}/bin/jlink \
      --add-modules \
      java.base,\
      java.compiler,\
      java.instrument,\
      java.logging,\
      java.management,\
      java.management.rmi,\
      java.naming,\
      java.net.http,\
      java.prefs,\
      java.rmi,\
      java.scripting,\
      java.se,\
      java.security.jgss,\
      java.security.sasl,\
      java.smartcardio,\
      java.sql,\
      java.sql.rowset,\
      java.transaction.xa,\
      java.xml,\
      java.xml.crypto,\
      jdk.attach,\
      jdk.charsets,\
      jdk.compiler,\
      jdk.crypto.cryptoki,\
      jdk.crypto.ec,\
      jdk.dynalink,\
      jdk.editpad,\
      jdk.graal.compiler,\
      jdk.graal.compiler.management,\
      jdk.hotspot.agent,\
      jdk.httpserver,\
      jdk.incubator.vector,\
      jdk.internal.ed,\
      jdk.internal.jvmstat,\
      jdk.internal.le,\
      jdk.internal.md,\
      jdk.internal.opt,\
      jdk.internal.vm.ci,\
      jdk.jartool,\
      jdk.javadoc,\
      jdk.jcmd,\
      jdk.jconsole,\
      jdk.jdeps,\
      jdk.jdi,\
      jdk.jdwp.agent,\
      jdk.jfr,\
      jdk.jlink,\
      jdk.jpackage,\
      jdk.jshell,\
      jdk.jsobject,\
      jdk.jstatd,\
      jdk.localedata,\
      jdk.management,\
      jdk.management.agent,\
      jdk.management.jfr,\
      jdk.naming.dns,\
      jdk.naming.rmi,\
      jdk.net,\
      jdk.nio.mapmode,\
      jdk.sctp,\
      jdk.security.auth,\
      jdk.security.jgss,\
      jdk.unsupported,\
      jdk.zipfs --no-man-pages -G \
      --output ${CRAFT_PART_INSTALL}/${JAVA_HOME}

      cd ${CRAFT_PART_INSTALL}
      mkdir -p usr/bin
      for tool in `ls ${CRAFT_PART_INSTALL}/${JAVA_HOME}/bin`; do
        ln -s --relative ${JAVA_HOME}/bin/${tool} usr/bin/
      done

  deb-security-manifest:
    plugin: make
    after:
      - runtime
      - dependencies
    source: https://github.com/canonical/rocks-security-manifest
    source-type: git
    source-branch: main
    override-prime: |
      gen_manifest
      FIELDS=(
          '${db:Status-Abbrev}'
          '${binary:Package}'
          '${Version}'
          '${source:Package}'
          '${Source:Version}\n'
        )
      IFS="," dpkg-query -f "${FIELDS[*]}" \
          -W openjdk-25-jdk-headless | head -n 1 \
        >> ${CRAFT_PRIME}/usr/share/rocks/dpkg.query
      craftctl default
