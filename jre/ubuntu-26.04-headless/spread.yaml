project: jre-26

backends:
  craft:
    type: craft
    systems:
      - ubuntu-26.04:
      - ubuntu-24.04:

suites:
  spread/general/:
    environment:
      MAVEN_IMAGE: maven:latest
      ROCK: jre:latest
      VERSION: 25.0

    summary: General integration tests

    prepare: |
      sudo snap install docker

      # For 'rockcraft.skopeo'
      sudo snap install --classic rockcraft

      # Wait for docker daemon to come online
      sudo apt-get install --yes retry
      retry --times=10 --delay 2 -- docker run hello-world
      sudo apt-get remove --yes retry

      # Load the rock into docker
      sudo rockcraft.skopeo --insecure-policy copy "oci-archive:$CRAFT_ARTIFACT" docker-daemon:$ROCK
      sudo apt-get install --yes openjdk-25-jdk-headless maven
      PROJECT_ROOT="$(dirname $CRAFT_ARTIFACT)"
      ARCH=$(dpkg-architecture -qDEB_HOST_ARCH)
      docker build --build-arg ARCH=${ARCH} \
        --build-arg BASE_IMAGE=${ROCK} -t ${MAVEN_IMAGE} \
        ${PROJECT_ROOT}/containers -f Dockerfile.26.04


    restore: |
      docker image rm --force jdk:latest
      docker image rm --force maven:latest

exclude:
  - .git

kill-timeout: 1h
