project: jre-11

backends:
  craft:
    type: craft
    systems:
      - ubuntu-24.04:

suites:
  spread/general/:
    summary: General integration tests
    environment:
      MAVEN_IMAGE: ubuntu/jre:test-maven
      RELEASE: 24.04
      ARCH: $(dpkg --print-architecture)
      ROCK: jre:latest
      VERSION: 11.0
    prepare: |
      sudo snap install docker

      # For 'rockcraft.skopeo'
      sudo snap install --classic rockcraft
      sudo apt-get update
      sudo apt-get install -y openjdk-11-jdk maven curl retry
      # Wait for docker daemon to come online

      retry --times=10 --delay 2 -- docker version

      # Load the rock into docker
      rockcraft.skopeo --insecure-policy copy "oci-archive:$CRAFT_ARTIFACT" docker-daemon:${ROCK}
      PROJECT_ROOT="$(dirname $CRAFT_ARTIFACT)"
      docker build \
        -t ${MAVEN_IMAGE} \
        --build-arg ARCH=${ARCH} \
        --build-arg UID=$(id -u ${USER}) \
        --build-arg GID=$(id -g ${USER}) \
        --build-arg BASE_IMAGE=${ROCK} \
        -f ${PROJECT_ROOT}/containers/maven/Dockerfile.${RELEASE} \
        ${PROJECT_ROOT}/containers/maven

    restore: |
      docker image rm --force ${ROCK}
      docker image rm --force ${MAVEN_IMAGE}

exclude:
  - .git

kill-timeout: 1h
